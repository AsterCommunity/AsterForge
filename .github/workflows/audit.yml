name: Security Audit

on:
  schedule:
    # 每周一 09:17 UTC（北京时间 17:17）
    - cron: '17 9 * * 1'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: read
  issues: write

jobs:
  rust-audit:
    name: Rust dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
