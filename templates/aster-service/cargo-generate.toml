[template]
description = "A minimal Aster service wired to AsterForge runtime components."
ignore = ["target", ".git"]

[placeholders.package_description]
type = "string"
prompt = "Cargo package description"
default = "Aster service wired to AsterForge runtime components."

[placeholders.server_port]
type = "string"
prompt = "HTTP bind port"
default = "3000"
